<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG 完全版</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
}

.game{
max-width:480px;
margin:auto;
padding:10px;
}

.panel{
background:#1b1b1b;
padding:10px;
margin:8px 0;
border-radius:10px;
}

.bar{
width:100%;
height:20px;
background:#333;
border-radius:10px;
margin:5px 0;
}

.hpbar{height:20px;background:red;border-radius:10px;}
.enemybar{height:15px;background:lime;border-radius:10px;}

button{
background:#333;
color:white;
border:none;
margin:3px;
padding:8px 12px;
border-radius:6px;
}

.item{
background:#222;
padding:6px;
margin:5px;
border-radius:8px;
}

.common{color:white}
.rare{color:#66aaff}
.epic{color:#cc66ff}
.legend{color:gold}
.mythic{color:red}
.boss{color:#ff4444;font-weight:bold}
</style>

</head>

<body>

<div class="game">

<h2>🏯塔RPG</h2>

<div class="panel">

<h3 id="enemy"></h3>

<div class="bar">
<div id="enemybar" class="enemybar"></div>
</div>

<div id="enemyHP"></div>

</div>

<div class="panel">

<div>階層 <span id="floor"></span></div>

<div class="bar">
<div id="hpbar" class="hpbar"></div>
</div>

<div>HP <span id="hp"></span></div>
<div>MP <span id="mp"></span></div>

<div>Lv <span id="level"></span></div>
<div>EXP <span id="exp"></span></div>

<div>💰 <span id="gold"></span></div>

<div>状態異常: <span id="status"></span></div>

</div>

<div class="panel">

<button onclick="playerAttack()">⚔攻撃</button> <button onclick="toggleAuto()">🤖オート</button>

<br>

<label>オート優先スキル <select id="prioritySkill">

<option value="0">🔥ファイア</option>
<option value="1">❄アイス</option>
<option value="2">⚡サンダー</option>
<option value="3">💖ヒール</option>
<option value="4">🛡バリア</option>
</select>
</label>

<div id="skills"></div>

</div>

<div class="panel">

<h3>🎒装備</h3>

<button onclick="combine()">🔨合成</button>

<div id="inventory"></div>

</div>

<div class="panel">

<h3>🏪ショップ</h3>

<button onclick="buyPotion()">HPポーション 20G</button> <button onclick="gacha()">装備ガチャ 100G</button>

</div>

<button onclick="save()">💾セーブ</button>

<div id="log"></div>

</div>

<script>

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMP=50
let playerMaxMP=50

let attack=5
let defense=2

let gold=100

let enemy=""
let enemyHP=0
let enemyMax=0

let auto=false
let prioritySkill=2

let inventory=[]

let playerStatus=[]
let enemyStatus=[]

let uraTower=false

let rarity=["common","rare","epic","legend","mythic","boss"]

let logHistory=[]

function log(t){
logHistory.unshift(t)
if(logHistory.length>6)logHistory.pop()
document.getElementById("log").innerHTML=logHistory.join("<br>")
}

function spawnEnemy(){

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

enemyMax=20+floor*5

if(uraTower)enemyMax*=5

enemyHP=enemyMax

if(floor%10==0){
enemy="🐉ボス"
enemyMax=200+floor*10
if(uraTower)enemyMax*=5
enemyHP=enemyMax
}

if(floor==200 && !uraTower){
enemy="👑塔の支配者"
enemyMax=5000
enemyHP=enemyMax
}

document.getElementById("enemy").innerText=enemy

}

function playerAttack(){

let dmg=attack

enemyHP-=dmg

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

if(enemyHP<=0){

if(enemy=="👑塔の支配者"){
alert("🏆塔クリア！裏の塔解放！")
uraTower=true
floor=201
spawnEnemy()
update()
return
}

gold+=10+floor
exp+=5

dropItem()

setTimeout(()=>{next()},200)

}

enemyAttack()

update()

}

function enemyAttack(){

if(enemyHP<=0)return

let dmg=5+floor-defense

if(uraTower)dmg*=2

if(dmg<1)dmg=1

playerHP-=dmg

if(playerHP<=0){
alert("ゲームオーバー")
location.reload()
}

}

function levelUp(){

if(exp>=expMax){

exp-=expMax
level++

expMax=Math.floor(expMax*1.4)

playerMax+=20
playerMaxMP+=10
attack+=2
defense+=1

playerHP=playerMax
playerMP=playerMaxMP

}

}

let skills=[

{name:"🔥ファイア",cost:20,action(){
if(playerMP<20)return
playerMP-=20
enemyHP-=attack*3
}},

{name:"❄アイス",cost:15,action(){
if(playerMP<15)return
playerMP-=15
enemyHP-=attack*2
if(Math.random()<0.5){
enemyStatus.push({icon:"❄",turns:1})
}
}},

{name:"⚡サンダー",cost:25,action(){
if(playerMP<25)return
playerMP-=25
enemyHP-=attack*2.5
if(Math.random()<0.5){
enemyStatus.push({icon:"⚡",turns:2})
}
}},

{name:"💖ヒール",cost:15,action(){
if(playerMP<15)return
playerMP-=15
playerHP+=30
if(playerHP>playerMax)playerHP=playerMax
}},

{name:"🛡バリア",cost:20,action(){
if(playerMP<20)return
playerMP-=20
defense+=5
setTimeout(()=>defense-=5,5000)
}}

]

function drawSkills(){

let html=""

skills.forEach((s,i)=>{
html+=`<button onclick="useSkill(${i})">${s.name}</button>`
})

document.getElementById("skills").innerHTML=html

}

function useSkill(i){

skills[i].action()

if(enemyHP<=0){

gold+=10+floor
exp+=5

dropItem()

setTimeout(()=>{next()},200)

}else{

enemyAttack()

}

update()

}

function dropItem(){

let isBoss=enemy.includes("ボス")||enemy=="👑塔の支配者"

if(isBoss && Math.random()<0.1){

let atk=30+floor
let def=20
let mp=30

inventory.push({atk,def,mp,rarity:"boss",level:1})

log("💎ボス装備ドロップ")

drawInventory()

return
}

if(Math.random()>0.3)return

let r=rarity[Math.floor(Math.random()*5)]

let atk=Math.floor(Math.random()*10)+floor
let def=Math.floor(Math.random()*5)
let mp=Math.floor(Math.random()*10)

inventory.push({atk,def,mp,rarity:r,level:1})

drawInventory()

}

function drawInventory(){

let html=""

inventory.forEach((i,index)=>{

html+=`
<div class="item ${i.rarity}">
ATK:${i.atk} DEF:${i.def} MP:${i.mp} Lv:${i.level}
<br>
<button onclick="equip(${index})">装備</button>
<button onclick="upgrade(${index})">強化</button>
</div>
`

})

document.getElementById("inventory").innerHTML=html

}

function equip(i){

let item=inventory[i]

attack+=item.atk
defense+=item.def
playerMaxMP+=item.mp

update()

}

function upgrade(i){

let item=inventory[i]

let cost=item.level*50

if(gold<cost)return

gold-=cost

item.level++

item.atk+=2
item.def+=1
item.mp+=2

drawInventory()
update()

}

function combine(){

let groups={}

inventory.forEach((i,index)=>{
if(!groups[i.rarity])groups[i.rarity]=[]
groups[i.rarity].push(index)
})

for(let r in groups){

if(groups[r].length>=3){

let a=groups[r].slice(0,3)

a.reverse().forEach(i=>inventory.splice(i,1))

let next=rarity.indexOf(r)+1
if(next>=rarity.length)next=rarity.length-1

inventory.push({
atk:10,
def:5,
mp:5,
rarity:rarity[next],
level:1
})

break

}

}

drawInventory()

}

function buyPotion(){

if(gold<20)return

gold-=20

playerHP+=50
if(playerHP>playerMax)playerHP=playerMax

}

function gacha(){

if(gold<100)return

gold-=100

let r=rarity[Math.floor(Math.random()*5)]

let atk=Math.floor(Math.random()*15)
let def=Math.floor(Math.random()*8)
let mp=Math.floor(Math.random()*15)

inventory.push({atk,def,mp,rarity:r,level:1})

drawInventory()

}

function next(){

floor++
spawnEnemy()
update()

}

function toggleAuto(){
auto=!auto
}

function autoBattle(){

if(!auto)return

let skill=skills[prioritySkill]

if(playerMP>=skill.cost){

skill.action()

}else{

playerAttack()

}

update()

}

setInterval(autoBattle,1000)

function save(){

let data={
floor,level,exp,gold,inventory,uraTower
}

localStorage.setItem("towerRPG",JSON.stringify(data))

}

document.getElementById("prioritySkill").onchange=function(){
prioritySkill=parseInt(this.value)
}

function update(){

levelUp()

document.getElementById("status").innerText=
playerStatus.map(s=>s.icon).join(" ")

document.getElementById("floor").innerText=floor
document.getElementById("hp").innerText=playerHP+"/"+playerMax
document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP
document.getElementById("level").innerText=level
document.getElementById("exp").innerText=exp+"/"+expMax
document.getElementById("gold").innerText=gold
document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"
document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

}

spawnEnemy()
drawSkills()
drawInventory()
update()

</script>

</body>
</html>
